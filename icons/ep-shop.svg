<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <defs>
  <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="2.2" result="blur"/>
    <feFlood flood-color="#00D9FF" flood-opacity="0.55" result="clr"/>
    <feComposite in="clr" in2="blur" operator="in" result="shadow"/>
    <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <linearGradient id="shg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#00D9FF"/>
    <stop offset="100%" stop-color="#00FF9F"/>
  </linearGradient>
  </defs>
  <!-- Bag body -->
  <path d="M5 9 H19 L17.5 21 H6.5 Z" fill="url(#shg)" filter="url(#glow)" opacity="0.88"/>
  <!-- Handle -->
  <path d="M9 9 C9 5 15 5 15 9" stroke="url(#shg)" stroke-width="1.8" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Tag/price line -->
  <line x1="9" y1="14" x2="15" y2="14" stroke="#003344" stroke-width="1" opacity="0.4"/>
  <!-- Highlight on bag -->
  <ellipse cx="9.5" cy="12" rx="1.5" ry="2.5" fill="white" opacity="0.15" transform="rotate(-5 9.5 12)"/>
</svg>