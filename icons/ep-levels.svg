<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <defs>  <filter id="g" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="2.2" result="b"/><feFlood flood-color="#00D9FF" flood-opacity="0.55" result="c"/><feComposite in="c" in2="b" operator="in" result="s"/><feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge></filter>  <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#00D9FF"/><stop offset="100%" stop-color="#00FF9F"/></linearGradient></defs>
  <!-- Grid of 9 node dots in 3×3, connected by lines -->
  <!-- Row lines -->
  <line x1="4" y1="5" x2="12" y2="5" stroke="url(#lg)" stroke-width="1" opacity="0.5"/>
  <line x1="12" y1="5" x2="20" y2="5" stroke="url(#lg)" stroke-width="1" opacity="0.5"/>
  <line x1="4" y1="12" x2="12" y2="12" stroke="url(#lg)" stroke-width="1" opacity="0.5"/>
  <line x1="12" y1="12" x2="20" y2="12" stroke="url(#lg)" stroke-width="1" opacity="0.5"/>
  <line x1="4" y1="19" x2="12" y2="19" stroke="url(#lg)" stroke-width="1" opacity="0.5"/>
  <line x1="12" y1="19" x2="20" y2="19" stroke="url(#lg)" stroke-width="1" opacity="0.5"/>
  <!-- Col lines -->
  <line x1="4" y1="5" x2="4" y2="19" stroke="url(#lg)" stroke-width="1" opacity="0.5"/>
  <line x1="12" y1="5" x2="12" y2="19" stroke="url(#lg)" stroke-width="1" opacity="0.5"/>
  <line x1="20" y1="5" x2="20" y2="19" stroke="url(#lg)" stroke-width="1" opacity="0.5"/>
  <!-- Nodes: 3×3 -->
  <circle cx="4"  cy="5"  r="2.2" fill="url(#lg)" filter="url(#g)"/>
  <circle cx="12" cy="5"  r="2.2" fill="url(#lg)" filter="url(#g)"/>
  <circle cx="20" cy="5"  r="2.2" fill="url(#lg)" filter="url(#g)"/>
  <circle cx="4"  cy="12" r="2.2" fill="url(#lg)" filter="url(#g)"/>
  <circle cx="12" cy="12" r="2.8" fill="url(#lg)" filter="url(#g)"/>
  <circle cx="20" cy="12" r="2.2" fill="url(#lg)" filter="url(#g)"/>
  <circle cx="4"  cy="19" r="2.2" fill="url(#lg)" filter="url(#g)"/>
  <circle cx="12" cy="19" r="2.2" fill="url(#lg)" filter="url(#g)"/>
  <circle cx="20" cy="19" r="2.2" fill="url(#lg)" filter="url(#g)"/>
</svg>