<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <defs>
  <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="2.5" result="blur"/>
    <feFlood flood-color="#FF9500" flood-opacity="0.55" result="clr"/>
    <feComposite in="clr" in2="blur" operator="in" result="shadow"/>
    <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <radialGradient id="cg" cx="38%" cy="32%" r="65%">
    <stop offset="0%" stop-color="#FFE566"/>
    <stop offset="100%" stop-color="#FF9500"/>
  </radialGradient>
  </defs>
  <!-- Coin body -->
  <circle cx="12" cy="12" r="9.5" fill="url(#cg)" filter="url(#glow)"/>
  <!-- Inner ring -->
  <circle cx="12" cy="12" r="7" fill="none" stroke="#FF9500" stroke-width="0.6" opacity="0.5"/>
  <!-- Echo-Path "EP" monogram — two arcs suggesting the logo -->
  <path d="M10 9 L10 15 M10 9 L13.5 9 Q15 9 15 10.5 Q15 12 13.5 12 L10 12"
    stroke="#B36800" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  <!-- Highlight -->
  <ellipse cx="9" cy="8.5" rx="2.5" ry="1.5" fill="white" opacity="0.22" transform="rotate(-25 9 8.5)"/>
</svg>