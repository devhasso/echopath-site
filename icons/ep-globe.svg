<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <defs>  <filter id="g" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="2.2" result="b"/><feFlood flood-color="#00FF9F" flood-opacity="0.55" result="c"/><feComposite in="c" in2="b" operator="in" result="s"/><feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge></filter>  <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#00D9FF"/><stop offset="100%" stop-color="#00FF9F"/></linearGradient></defs>
  <!-- Outer circle -->
  <circle cx="12" cy="12" r="9.5" stroke="url(#lg)" stroke-width="1.5" filter="url(#g)"/>
  <!-- Latitude lines -->
  <ellipse cx="12" cy="12" rx="9.5" ry="4" stroke="url(#lg)" stroke-width="1" fill="none" opacity="0.45"/>
  <line x1="2.5" y1="12" x2="21.5" y2="12" stroke="url(#lg)" stroke-width="1" opacity="0.45"/>
  <!-- Meridian / central oval -->
  <ellipse cx="12" cy="12" rx="4.5" ry="9.5" stroke="url(#lg)" stroke-width="1.2" fill="none" opacity="0.6"/>
  <!-- Top and bottom poles -->
  <line x1="12" y1="2.5" x2="12" y2="21.5" stroke="url(#lg)" stroke-width="1" opacity="0.3"/>
</svg>