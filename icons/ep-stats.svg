<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <defs>
  <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="2.2" result="blur"/>
    <feFlood flood-color="#00FF9F" flood-opacity="0.55" result="clr"/>
    <feComposite in="clr" in2="blur" operator="in" result="shadow"/>
    <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <linearGradient id="stg" x1="0%" y1="100%" x2="0%" y2="0%">
    <stop offset="0%" stop-color="#00FF9F"/>
    <stop offset="100%" stop-color="#00D9FF"/>
  </linearGradient>
  </defs>
  <!-- 3 bars ascending left to right -->
  <rect x="3" y="15" width="4.5" height="7" rx="1" fill="url(#stg)" filter="url(#glow)" opacity="0.7"/>
  <rect x="9.75" y="9" width="4.5" height="13" rx="1" fill="url(#stg)" filter="url(#glow)" opacity="0.85"/>
  <rect x="16.5" y="3" width="4.5" height="19" rx="1" fill="url(#stg)" filter="url(#glow)"/>
  <!-- Top highlight on each bar -->
  <rect x="3" y="15" width="4.5" height="1.5" rx="1" fill="white" opacity="0.2"/>
  <rect x="9.75" y="9" width="4.5" height="1.5" rx="1" fill="white" opacity="0.2"/>
  <rect x="16.5" y="3" width="4.5" height="1.5" rx="1" fill="white" opacity="0.2"/>
</svg>