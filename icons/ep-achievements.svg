<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <defs>
  <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="2.5" result="blur"/>
    <feFlood flood-color="#FFD60A" flood-opacity="0.55" result="clr"/>
    <feComposite in="clr" in2="blur" operator="in" result="shadow"/>
    <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <linearGradient id="ag" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#FFE566"/>
    <stop offset="100%" stop-color="#FF9500"/>
  </linearGradient>
  </defs>
  <!-- Cup body -->
  <path d="M7 3 H17 V13 Q17 19 12 20 Q7 19 7 13 Z"
    fill="url(#ag)" filter="url(#glow)" opacity="0.92"/>
  <!-- Handles -->
  <path d="M7 5.5 Q3 5.5 3 9 Q3 12.5 7 12.5" stroke="url(#ag)" stroke-width="1.8" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M17 5.5 Q21 5.5 21 9 Q21 12.5 17 12.5" stroke="url(#ag)" stroke-width="1.8" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Base stem -->
  <rect x="10.5" y="20" width="3" height="1.5" rx="0.5" fill="url(#ag)" filter="url(#glow)"/>
  <!-- Base plate -->
  <rect x="7.5" y="21.2" width="9" height="1.3" rx="0.65" fill="url(#ag)" filter="url(#glow)"/>
  <!-- Star on cup -->
  <polygon points="12,6.5 12.8,8.8 15.2,8.8 13.3,10.2 14,12.5 12,11.1 10,12.5 10.7,10.2 8.8,8.8 11.2,8.8"
    fill="#B36800" opacity="0.55"/>
  <!-- Cup highlight -->
  <ellipse cx="10" cy="7" rx="1.5" ry="2.5" fill="white" opacity="0.18" transform="rotate(-10 10 7)"/>
</svg>