<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <defs><filter id="g" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="2.5" result="b"/><feFlood flood-color="#FFD60A" flood-opacity="0.5" result="c"/><feComposite in="c" in2="b" operator="in" result="s"/><feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge></filter><linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#FFE566"/><stop offset="100%" stop-color="#FF9500"/></linearGradient></defs>
  <!-- Crown base band -->
  <rect x="3" y="16" width="18" height="4" rx="1.5" fill="url(#lg)" filter="url(#g)" opacity="0.9"/>
  <!-- Crown points: 5 spikes -->
  <path d="M3 16 L3 8 L7.5 13 L12 4 L16.5 13 L21 8 L21 16 Z" fill="url(#lg)" filter="url(#g)" opacity="0.92"/>
  <!-- Jewels on band -->
  <circle cx="7"  cy="18" r="1.5" fill="#FF3B5C" opacity="0.8" filter="url(#g)"/>
  <circle cx="12" cy="18" r="1.8" fill="#00D9FF" opacity="0.9" filter="url(#g)"/>
  <circle cx="17" cy="18" r="1.5" fill="#00FF9F" opacity="0.8" filter="url(#g)"/>
  <!-- Highlight -->
  <path d="M5 9 L5 15" stroke="white" stroke-width="0.8" opacity="0.2" stroke-linecap="round"/>
</svg>